<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Gradiente principal -->
    <radialGradient id="bubble" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"></stop>
      <stop offset="35%" stop-color="#dffcff" stop-opacity="0.95"></stop>
      <stop offset="70%" stop-color="#7fe4ff" stop-opacity="0.75"></stop>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0.35"></stop>
    </radialGradient>

    <!-- Reflexo -->
    <radialGradient id="shine">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.8" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Glow de fundo -->
  <circle cx="33" cy="32" r="24" fill="#7fe4ff" opacity=".18" filter="url(#glow)"></circle>

  <!-- Bolha principal -->
  <circle cx="32" cy="32" r="18" fill="url(#bubble)" stroke="rgba(255,255,255,.9)" stroke-width="1.4"></circle>

  <!-- Reflexo -->
  <ellipse cx="26" cy="24" rx="6" ry="3.5" fill="url(#shine)" opacity=".95"></ellipse>

  <!-- Reflexo menor -->
  <circle cx="39" cy="38" r="2.3" fill="#ffffff" opacity=".55"></circle>

  <!-- Bolha superior -->
  <circle cx="47" cy="18" r="7" fill="url(#bubble)" stroke="#ffffff" stroke-opacity=".7" stroke-width="1"></circle>

  <ellipse cx="44.5" cy="15.5" rx="2.2" ry="1.3" fill="#ffffff" opacity=".9"></ellipse>

  <!-- Bolha inferior -->
  <circle cx="18" cy="47" r="5" fill="url(#bubble)" stroke="#ffffff" stroke-opacity=".65" stroke-width=".9"></circle>

  <circle cx="16.5" cy="45.5" r="1.2" fill="#ffffff" opacity=".85"></circle>
</svg>